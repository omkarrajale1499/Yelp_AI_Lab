apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: yelp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: omkarrajale/yelp-ai-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8004
          env:
            - name: MONGODB_URI
              value: mongodb://mongodb:27017
            - name: OLLAMA_BASE_URL
              value: http://host.docker.internal:11434
            - name: OLLAMA_MODEL
              value: llama3.2:3b
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: TAVILY_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: yelp
spec:
  type: LoadBalancer
  selector:
    app: ai-service
  ports:
    - name: http
      port: 8004
      targetPort: 8004