apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: yelp
type: Opaque
stringData:
  JWT_SECRET: lab2_secret_key_change_later
  TAVILY_API_KEY: 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
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: yelp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: omkarrajale/yelp-user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef:
                name: yelp-common-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: yelp
spec:
  type: LoadBalancer
  selector:
    app: user-service
  ports:
    - name: http
      port: 8001
      targetPort: 8001
---
